# Dex Productivity Integrations Config
# This file tracks which integrations are enabled and their settings

# Last updated: (auto-updated when integrations change)
last_updated: '2026-02-04T18:41:25.882536'

# Enabled integrations
enabled:
  notion: false
  slack: true
  google: false
  atlassian: true

# Integration-specific settings are stored in separate files:
# - slack.yaml (Slack-specific config)
# - google.yaml (Google-specific config)

# Integration hooks - which Dex features use integrations
hooks:
  meeting_prep:
    use_notion: false     # Optional: set true if Notion MCP is configured
    use_slack: true       # Pull recent Slack context with attendees
    use_google: true      # Pull email threads with attendees
    use_confluence: true  # Search Confluence when Atlassian MCP is connected
  
  person_pages:
    use_notion: false     # Optional: link Notion pages if MCP is configured
    use_slack: true       # Show Slack mentions
    use_google: true      # Show email history
  
  daily_plan:
    use_notion: false     # Not used by default
    use_slack: true      # Not used by default  
    use_google: true      # Surface emails needing response

  commitment_detection:
    use_slack: true       # Detect promises in Slack

# Detection cache (auto-populated by detect.py)
detected:
  notion: null
  slack: null
  google: null

# Atlassian Cloud (official Remote MCP: Jira + Confluence). OAuth via MCP — see .cursor/mcp.json atlassian-mcp.
atlassian:
  enabled: true
  configured_at: '2026-04-13'
  cloud_id: ''
  site_url: ''
  jira:
    enabled: false
    project_key: ''
    issue_type: Task
    task_sync: false
    trust_level: readonly
  confluence:
    enabled: true
    space_key: ''
