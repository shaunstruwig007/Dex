# Strategic Pillars Configuration
#
# Pillars are your main focus areas — think of them as how you carve up your role thematically.
# Refreshed via /setup (2026-03-19).
#
# The Work MCP uses these to categorize tasks and check balance across your work.

pillars:
  - id: product_launch_mvp
    name: "New product launch"
    description: "Ship MVP / skeleton; define roadmap and next steps (process still forming)."
    keywords:
      - launch
      - MVP
      - skeleton
      - roadmap
      - backlog
      - release
      - product
      - discovery
      - scope

  - id: client_migration
    name: "Client migration"
    description: "Move clients onto new packaging, channels, integrations, and operating rhythm."
    keywords:
      - migration
      - onboarding
      - customer
      - rollout
      - implementation
      - cutover
      - frontline

  - id: ai_pdlc
    name: "AI in the PDLC"
    description: "Drive AI adoption, improvement, and efficiency across the product development life cycle."
    keywords:
      - AI
      - PDLC
      - automation
      - efficiency
      - tooling
      - workflow
      - quality
      - documentation

# Priority limits (how many active tasks per priority level)
priority_limits:
  P0: 3   # Critical/urgent - max 3 at a time
  P1: 5   # Important - max 5 at a time
  P2: 10  # Normal - suggested limit
